name: Newsletter auto

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Attendre le déploiement Vercel
        run: sleep 90

      - name: Envoyer la newsletter
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://stevemoradel.com/api/notify?secret=moradel-notify-2026"
